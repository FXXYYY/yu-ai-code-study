# 阿里云 DashScope 配置
# LangGraph4j Studio 配置
# 注意：langgraph4j-studio-springboot 不提供内置 UI，需访问静态页面
# 访问地址: http://localhost:8123/api/langgraph4j/studio
langgraph4j:
  studio:
    # Studio HTML 页面路径（通过 Controller 提供）
    path: /langgraph4j/studio
    # 是否启用工作流 Bean 注册
    enabled: true

dashscope:
  api-key:
  image-model: wan2.2-t2i-flash



