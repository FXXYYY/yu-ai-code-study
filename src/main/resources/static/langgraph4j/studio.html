<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph4j Studio - 工作流可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .workflow-selector {
            flex: 1;
            min-width: 200px;
        }
        
        select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .content {
            padding: 30px;
        }
        
        .graph-container {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .mermaid {
            width: 100%;
        }
        
        .info-panel {
            margin-top: 20px;
            padding: 20px;
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }
        
        .info-panel h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .info-panel ul {
            list-style-position: inside;
            line-height: 1.8;
        }
        
        .loading {
            text-align: center;
            color: #6c757d;
            font-size: 1.2em;
        }
        
        .error {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 4px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 LangGraph4j Studio</h1>
            <p>智能代码生成工作流可视化平台</p>
        </div>
        
        <div class="controls">
            <div class="workflow-selector">
                <select id="workflowSelect">
                    <option value="">-- 选择工作流 --</option>
                    <option value="simple">简单代码生成工作流</option>
                    <option value="concurrent">并发代码生成工作流</option>
                </select>
            </div>
            <button onclick="loadWorkflow()">加载工作流图</button>
            <button onclick="executeWorkflow()">执行工作流</button>
        </div>
        
        <div class="content">
            <div class="graph-container">
                <div id="graphDisplay" class="loading">
                    请选择一个工作流并点击"加载工作流图"
                </div>
            </div>
            
            <div class="info-panel">
                <h3>📋 使用说明</h3>
                <ul>
                    <li><strong>简单工作流</strong>：串行执行，适合基础代码生成任务</li>
                    <li><strong>并发工作流</strong>：并行图片收集，提升效率</li>
                    <li>点击"执行工作流"可以通过 API 触发实际执行</li>
                    <li>工作流图使用 Mermaid 渲染，支持缩放和交互</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        // 初始化 Mermaid
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'default',
            securityLevel: 'loose'
        });
        
        async function loadWorkflow() {
            const workflowType = document.getElementById('workflowSelect').value;
            const graphDisplay = document.getElementById('graphDisplay');
            
            if (!workflowType) {
                alert('请先选择一个工作流！');
                return;
            }
            
            graphDisplay.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch(`/api/workflow/graph/${workflowType}`);
                const result = await response.json();
                
                if (result.code === 0 && result.data) {
                    const mermaidCode = result.data;
                    graphDisplay.innerHTML = `<div class="mermaid">${mermaidCode}</div>`;
                    
                    // 重新渲染 Mermaid 图
                    await mermaid.run({
                        nodes: document.querySelectorAll('.mermaid')
                    });
                } else {
                    graphDisplay.innerHTML = `<div class="error">加载失败: ${result.message || '未知错误'}</div>`;
                }
            } catch (error) {
                console.error('Error loading workflow:', error);
                graphDisplay.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }
        
        async function executeWorkflow() {
            const workflowType = document.getElementById('workflowSelect').value;
            
            if (!workflowType) {
                alert('请先选择一个工作流！');
                return;
            }
            
            const prompt = prompt('请输入代码生成提示词：', '创建一个个人博客首页');
            
            if (!prompt) {
                return;
            }
            
            const endpoint = workflowType === 'simple' ? '/api/workflow/simple/execute' : '/api/workflow/concurrent/execute';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                const result = await response.json();
                
                if (result.code === 0) {
                    alert('工作流执行成功！请查看控制台日志了解详情。');
                    console.log('Execution result:', result.data);
                } else {
                    alert(`执行失败: ${result.message}`);
                }
            } catch (error) {
                console.error('Error executing workflow:', error);
                alert(`执行失败: ${error.message}`);
            }
        }
        
        // 页面加载时自动选择第一个工作流
        window.addEventListener('load', () => {
            document.getElementById('workflowSelect').value = 'simple';
        });
    </script>
</body>
</html>
